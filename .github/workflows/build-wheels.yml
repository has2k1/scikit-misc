# Ref: https://github.com/scipy/scipy/blob/main/.github/workflows/windows.yml

# Workflow to build and test wheels.
# To work on the wheel building infrastructure on a fork, comment out:
#
# if: github.repository == 'has2k1/scikit-misc'
#
# in the get_commit_message job include [wheel build] in your commit
# message to trigger the build. All files related to wheel building are located
# at tools/wheels/
name: Build Wheels
on:
  schedule:
    #        ┌───────────── minute (0 - 59)
    #        │  ┌───────────── hour (0 - 23)
    #        │  │ ┌───────────── day of the month (1 - 31)
    #        │  │ │ ┌───────────── month (1 - 12 or JAN-DEC)
    #        │  │ │ │ ┌───────────── day of the week (0 - 6 or SUN-SAT)
    #        │  │ │ │ │
    - cron: "0  0 * * 6"
  push:
    tags:
      - v*
    branches:
      - wheels
  workflow_dispatch:

permissions:
   contents: read  # to fetch code (actions/checkout)

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  parse_commit_info:
    name: Parse Commit Information
    runs-on: ubuntu-latest
    if: github.repository == 'has2k1/scikit-misc'
    outputs:
      can_build: ${{ steps.decide.outputs.can_build }}
      can_release: ${{ steps.decide.outputs.can_release }}
      can_pre_release: ${{ steps.decide.outputs.can_pre_release }}
    steps:
      - name: Checkout scikit-misc
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all Tags
        run: |
          git fetch --tags --force
          git log -n 1

      - name: Copy build utils
        run: |
          cp -r .github/utils ../utils

      - name: Environment information
        run: |
          echo "GITHUB_REPOSITORY=$GITHUB_REPOSITORY"
          echo "GITHUB_SHA=$GITHUB_SHA"
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "GITHUB_REF_TYPE=$GITHUB_REF_TYPE"
          echo "GITHUB_EVENT_NAME=$GITHUB_EVENT_NAME"
          echo "git describe: $(git describe --long)"

      - name: Debug
        run: |
          set -xe
          commit_message=$(python ../utils/please.py commit_message)
          skip_ci_message=$(python ../utils/please.py skip_ci_message)
          skip_gha_message=$(python ../utils/please.py skip_gha_message)
          skip_build=$(python ../utils/please.py skip_build)
          is_wheel_build=$(python ../utils/please.py is_wheel_build)

      - name: Decide Whether to Build and/or Release
        id: decide
        run: |
          set -xe
          CAN_BUILD=$(python ../utils/please.py can_i_build)
          CAN_RELEASE=$(python ../utils/please.py can_i_release)
          CAN_PRE_RELEASE=$(python ../utils/please.py can_i_pre_release)

          echo "can_build=$CAN_BUILD" >> $GITHUB_OUTPUT
          echo "can_release=$CAN_RELEASE" >> $GITHUB_OUTPUT
          echo "can_pre_release=$CAN_PRE_RELEASE" >> $GITHUB_OUTPUT
          echo github.ref ${{ github.ref }}

  build_wheels:
    name: Wheel, ${{ matrix.python[0] }}-${{ matrix.buildplat[1] }}
      ${{ matrix.buildplat[2] }}
    needs: parse_commit_info

    if: contains(needs.parse_commit_info.outputs.can_build, 'true')
    runs-on: ${{ matrix.buildplat[0] }}

    strategy:
      # Ensure that a wheel builder finishes even if another fails
      fail-fast: false
      matrix:
        # Github Actions doesn't support pairing matrix values together, let's improvise
        # https://github.com/github/feedback/discussions/7835#discussioncomment-1769026
        buildplat:
        # should also be able to do multi-archs on a single entry, e.g.
        # [windows-2019, win*, "AMD64 x86"]. However, those two require a different compiler setup
        # so easier to separate out here.
        - [ubuntu-22.04, manylinux, x86_64, "", ""]
        - [macos-12, macosx, x86_64, openblas, "10.9"]
        - [macos-14, macosx, arm64, openblas, "12.0"]
        - [windows-2019, win, AMD64, "", "" ]

        # python: [["cp310", "3.10"], ["cp311", "3.11"], ["cp312", "3.12"], ["cp313", "3.13"]]
        python: [["cp310", "3.10"]]

    env:
      IS_32_BIT: ${{ matrix.buildplat[2] == 'x86' }}
      IS_64_BIT: ${{ matrix.buildplat[2] == 'AMD64' || matrix.buildplat[2] == 'x86_64' }}

    steps:
      - name: Checkout scikit-misc
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all Tags
        run: |
          git fetch --tags --force
          echo "git describe: $(git describe --long)"

      - name: Copy build utils
        run: |
          cp -r .github/utils ../utils

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout build target
        run: |
          python ../utils/please.py checkout_build_commit

      - name: Install pip packages
        run: |
          pip install wheel

      - name: win_amd64 - install rtools
        if: ${{ runner.os == 'Windows' && env.IS_64_BIT == 'true' }}
        run: |
          # mingw-w64
          choco install rtools -y --no-progress --force --version=4.0.0.20220206
          echo "c:\rtools40\ucrt64\bin;" >> $env:GITHUB_PATH

      - name: windows - set PKG_CONFIG_PATH
        if: ${{ runner.os == 'Windows' }}
        run: |
          $env:CIBW = "${{ github.workspace }}"
          # It seems somewhere in the env passing, `\` is not
          # passed through, so convert it to '/'
          $env:CIBW=$env:CIBW.replace("\","/")
          echo "CIBW_ENVIRONMENT=PKG_CONFIG_PATH=$env:CIBW" >> $env:GITHUB_ENV

      - name: Setup macOS
        if: startsWith( matrix.buildplat[0], 'macos-' )
        run: |
          if [[ ${{ matrix.buildplat[4] }} == '10.9' ]]; then
            # Newest version of Xcode that supports macOS 10.9
            XCODE_VER='13.4.1'
          else
            XCODE_VER='15.2'
          fi
          CIBW="sudo xcode-select -s /Applications/Xcode_${XCODE_VER}.app"
          echo "CIBW_BEFORE_ALL=$CIBW" >> $GITHUB_ENV
          # setting SDKROOT necessary when using the gfortran compiler
          # installed in cibw_before_build_macos.sh
          sudo xcode-select -s /Applications/Xcode_${XCODE_VER}.app
          CIBW="MACOSX_DEPLOYMENT_TARGET=${{ matrix.buildplat[4] }}\
            SDKROOT=$(xcrun --sdk macosx --show-sdk-path)\
            PKG_CONFIG_PATH=${{ github.workspace }}"
          echo "CIBW_ENVIRONMENT_MACOS=$CIBW" >> "$GITHUB_ENV"

          echo "REPAIR_PATH=$LIB_PATH" >> "$GITHUB_ENV"

          PREFIX=DYLD_LIBRARY_PATH="\$(dirname \$(gfortran --print-file-name libgfortran.dylib))"
          # remove libgfortran from location used for linking (if any), to
          # check wheel has bundled things correctly and all tests pass without
          # needing installed gfortran
          POSTFIX=" sudo rm -rf /opt/gfortran-darwin-x86_64-native &&\
                    sudo rm -rf /usr/local/gfortran/lib"
          CIBW="$PREFIX delocate-listdeps -d {wheel} && echo "-----------" &&\
            $PREFIX delocate-wheel -v $EXCLUDE --require-archs \
            {delocate_archs} -w {dest_dir} {wheel} && echo "-----------" &&\
            delocate-listdeps -d {dest_dir}/*.whl && echo "-----------" &&\
            $POSTFIX"

          echo "CIBW_REPAIR_WHEEL_COMMAND_MACOS=$CIBW" >> "$GITHUB_ENV"

      - name: Inject environment variable for python dev version
        if: matrix.python[1] == '3.13'
        shell: bash
        run: |
          # For dev versions of python need to use wheels from scientific-python-nightly-wheels
          # When the python version is released please comment out this section, but do not remove
          # (there will soon be another dev version to target).
          DEPS0="pip install --pre -i https://pypi.anaconda.org/scientific-python-nightly-wheels/simple numpy"
          DEPS1="pip install ninja meson-python cython"

          CIBW="$DEPS0;$DEPS1;bash {project}/tools/wheels/cibw_before_build_linux.sh {project}"
          echo "CIBW_BEFORE_BUILD_LINUX=$CIBW" >> "$GITHUB_ENV"

          CIBW="$DEPS0 && $DEPS1 && bash {project}/tools/wheels/cibw_before_build_win.sh {project}"
          echo "CIBW_BEFORE_BUILD_WINDOWS=$CIBW" >> "$GITHUB_ENV"

          CIBW="$DEPS0;$DEPS1;bash {project}/tools/wheels/cibw_before_build_macos.sh {project}"
          echo "CIBW_BEFORE_BUILD_MACOS=$CIBW" >> "$GITHUB_ENV"

          echo "CIBW_BEFORE_TEST=$DEPS0" >> "$GITHUB_ENV"

          CIBW="pip; args: --no-build-isolation"
          echo "CIBW_BUILD_FRONTEND=$CIBW" >> "$GITHUB_ENV"

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.17.0
        env:
          CIBW_BUILD: ${{ matrix.python[0] }}-${{ matrix.buildplat[1] }}*
          CIBW_ARCHS: ${{ matrix.buildplat[2] }}
          CIBW_PRERELEASE_PYTHONS: True

      - name: Check symbols
        run: |
          set -x
          pip install delocate
          ls -la
          pushd wheelhouse
          unzip *.whl
          ls -la
          delocate-listdeps *.whl
          nm skmisc/loess/*.so | grep -v "^__?Py"
          nm -gu *.so | grep -v "^__\?Py"
          popd

      - name: Check Package Version
        run: |
          ls wheelhouse/*.whl
          python ../utils/check_package_version.py

      - uses: actions/upload-artifact@v4
        with:
          # @v4 does not merge artifacts with the name (even if the contents)
          # are different. So in a matrix, we have to give each artifact a
          # unique name. We merge these later in another job.
          name: wheel-${{ matrix.python[0] }}-${{ matrix.buildplat[1] }}
          path: ./wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    name: Build Source Distribution
    needs: [build_wheels]
    steps:
      - name: Checkout scikit-misc
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all Tags
        run: |
          git fetch --tags --force

      - name: Copy build utils
        run: |
          cp -r .github/utils ../utils

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout build target
        run: |
          python ../utils/please.py checkout_build_commit

      - name: Install Ubuntu dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libopenblas-dev liblapack-dev gfortran

      - name: Install requirements
        run: |
          pip install uv
          uv pip install --system ".[build]"

      - name: Create Source Distribution
        run: |
          make sdist

      - name: Check Package Version
        run: |
          ls dist/*.tar.gz
          python ../utils/check_package_version.py

      - name: Upload Source dist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # Merge all the artifacts into a single bundle
  # https://github.com/actions/upload-artifact/blob/main/merge/README.md
  merge-artifacts:
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist]
    steps:
      - name: Merge Artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: wheels
          delete-merged: true

  release:
    runs-on: ubuntu-latest
    name: Upload Release to PyPI
    needs: [parse_commit_info, merge-artifacts]
    if: contains(needs.parse_commit_info.outputs.can_release, 'true')
    steps:
      - name: Checkout scikit-misc
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Release Requirements
        run: |
          pip install uv
          uv pip install --system twine

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Publish to PyPI
        run: |
          ls -la ${{ github.workspace }}/dist

          # publish wheels first so that there is no window where users
          # may accidentally install an sdist instead of a wheel
          twine upload --skip-existing ${{ github.workspace }}/dist/*.whl
          twine upload --skip-existing ${{ github.workspace }}/dist/*.tar.gz
        env:
          TWINE_USERNAME: ${{ secrets.TWINE_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD }}

  pre_release:
    runs-on: ubuntu-latest
    name: Upload Release to TestPyPI
    needs: [parse_commit_info, merge-artifacts]
    if: contains(needs.parse_commit_info.outputs.can_pre_release, 'true')
    steps:
      - name: Checkout scikit-misc
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Release Requirements
        run: |
          pip install uv
          uv pip install --system twine

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels
          path: dist

      - name: Publish to TestPyPI
        run: |
          ls -la ${{ github.workspace }}/dist

          # publish wheels first so that there is no window where users
          # may accidentally install an sdist instead of a wheel
          twine upload --skip-existing --repository testpypi ${{ github.workspace }}/dist/*.whl
          twine upload --skip-existing --repository testpypi ${{ github.workspace }}/dist/*.tar.gz
        env:
          TWINE_USERNAME: ${{ secrets.TWINE_USERNAME_TEST }}
          TWINE_PASSWORD: ${{ secrets.TWINE_PASSWORD_TEST }}
